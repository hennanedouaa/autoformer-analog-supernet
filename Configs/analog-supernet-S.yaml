patch_embed:
  img_size: 224
  patch_size: 16
  in_chans: 3
  embed_dim_choices: [320, 384, 448]
  scale: false

linear_super_ops:

  mlp_fc1:
    # d=320
    - [320, 960]    # 320 * 3.0
    - [320, 1120]   # 320 * 3.5
    - [320, 1280]   # 320 * 4.0
    # d=384
    - [384, 1152]   # 384 * 3.0
    - [384, 1344]   # 384 * 3.5
    - [384, 1536]   # 384 * 4.0
    # d=448
    - [448, 1344]   # 448 * 3.0
    - [448, 1568]   # 448 * 3.5
    - [448, 1792]   # 448 * 4.0

  mlp_fc2:
    # d=320, r=3.0
    - [960, 320]
    # d=320, r=3.5
    - [1120, 320]
    # d=320, r=4.0
    - [1280, 320]
    # d=384, r=3.0
    - [1152, 384]
    # d=384, r=3.5
    - [1344, 384]
    # d=384, r=4.0
    - [1536, 384]
    # d=448, r=3.0
    - [1344, 448]
    # d=448, r=3.5
    - [1568, 448]
    # d=448, r=4.0
    - [1792, 448]

  attn_qkv:
    # ---- change_qkv = False (d, 3*d)
    - [320, 960]    # 320 * 3
    - [384, 1152]   # 384 * 3
    - [448, 1344]   # 448 * 3
    # ---- change_qkv = True (d, 3 * qkv_dim) with qkv_dim ∈ {320,384,448}
    - [320, 960]    # d=320, qkv_dim=320
    - [320, 1152]   # d=320, qkv_dim=384
    - [320, 1344]   # d=320, qkv_dim=448
    - [384, 960]    # d=384, qkv_dim=320
    - [384, 1152]   # d=384, qkv_dim=384
    - [384, 1344]   # d=384, qkv_dim=448
    - [448, 960]    # d=448, qkv_dim=320
    - [448, 1152]   # d=448, qkv_dim=384
    - [448, 1344]   # d=448, qkv_dim=448

  attn_proj:
    # All (in, out) pairs where in ∈ {320,384,448} and out ∈ {320,384,448}
    - [320, 320]
    - [320, 384]
    - [320, 448]
    - [384, 320]
    - [384, 384]
    - [384, 448]
    - [448, 320]
    - [448, 384]
    - [448, 448]

  head:
    - [320, 1000]
    - [384, 1000]
    - [448, 1000]