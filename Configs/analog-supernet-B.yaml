patch_embed:
  img_size: 224
  patch_size: 16
  in_chans: 3
  embed_dim_choices: [528, 576, 624]
  scale: false

linear_super_ops:

  mlp_fc1:
    # d=528
    - [528, 1584]   # 528 * 3.0
    - [528, 1848]   # 528 * 3.5
    - [528, 2112]   # 528 * 4.0
    # d=576
    - [576, 1728]   # 576 * 3.0
    - [576, 2016]   # 576 * 3.5
    - [576, 2304]   # 576 * 4.0
    # d=624
    - [624, 1872]   # 624 * 3.0
    - [624, 2184]   # 624 * 3.5
    - [624, 2496]   # 624 * 4.0

  mlp_fc2:
    # d=528
    - [1584, 528]
    - [1848, 528]
    - [2112, 528]
    # d=576
    - [1728, 576]
    - [2016, 576]
    - [2304, 576]
    # d=624
    - [1872, 624]
    - [2184, 624]
    - [2496, 624]

  attn_qkv:
    # ---- change_qkv = False (d, 3*d)
    - [528, 1584]   # 528 * 3
    - [576, 1728]   # 576 * 3
    - [624, 1872]   # 624 * 3
    # ---- change_qkv = True (d, 3*qkv_dim) with qkv_dim ∈ {576, 640}
    - [528, 1728]   # d=528, qkv_dim=576 -> 3*576=1728
    - [528, 1920]   # d=528, qkv_dim=640 -> 3*640=1920
    - [576, 1728]   # d=576, qkv_dim=576 -> 1728
    - [576, 1920]   # d=576, qkv_dim=640 -> 1920
    - [624, 1728]   # d=624, qkv_dim=576 -> 1728
    - [624, 1920]   # d=624, qkv_dim=640 -> 1920

  attn_proj:
    # (in, out) where in ∈ {528,576,624,640} and out ∈ {528,576,624}
    - [528, 528]
    - [528, 576]
    - [528, 624]
    - [576, 528]
    - [576, 576]
    - [576, 624]
    - [624, 528]
    - [624, 576]
    - [624, 624]
    - [640, 528]
    - [640, 576]
    - [640, 624]

  head:
    - [528, 1000]
    - [576, 1000]
    - [624, 1000]