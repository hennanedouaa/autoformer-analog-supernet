patch_embed:
  img_size: 224
  patch_size: 16
  in_chans: 3
  embed_dim_choices: [192, 216, 240, 256]
  scale: false

linear_super_ops:

  mlp_fc1:
    - [192, 672]    # 192 * 3.5
    - [192, 768]    # 192 * 4.0
    - [216, 756]    # 216 * 3.5
    - [216, 864]    # 216 * 4.0
    - [240, 840]    # 240 * 3.5
    - [240, 960]    # 240 * 4.0
    - [256, 896]    # 256 * 3.5   (ADDED)
    - [256, 1024]   # 256 * 4.0

  mlp_fc2:
    - [672, 192]
    - [768, 192]
    - [756, 216]
    - [864, 216]
    - [840, 240]
    - [960, 240]
    - [896, 256]    # (ADDED)
    - [1024,256]

  # QKV projection choices
  attn_qkv:
    # ---- change_qkv = False (AutoFormer LinearSuper path)
    - [192, 576]    # 192 * 3
    - [216, 648]    # 216 * 3
    - [240, 720]    # 240 * 3
    - [256, 768]    # 256 * 3
    # ---- change_qkv = True (AutoFormer qkv_super path)
    - [192, 576]    # 192 * (3*192/?) Actually 3 * qkv_dim with qkv_dim=192
    - [192, 768]    # 192 * (3*256) with qkv_dim=256
    - [216, 576]    # 216 * 576 (3*192)
    - [216, 768]    # 216 * 768 (3*256)
    - [240, 576]    # 240 * 576
    - [240, 768]    # 240 * 768
    - [256, 576]    # 256 * 576   (ADDED to cover 256 embed with qkv_dim=192)
    - [256, 768]    # 256 * 768   (ADDED to cover 256 embed with qkv_dim=256)

  # Attention projection choices
  attn_proj:
    - [192, 192]
    - [192, 216]
    - [192, 240]
    - [192, 256]
    - [216, 192]
    - [216, 216]
    - [216, 240]
    - [216, 256]
    - [240, 192]
    - [240, 216]
    - [240, 240]
    - [240, 256]
    - [256, 192]
    - [256, 216]
    - [256, 240]
    - [256, 256]

  head:
    - [192, 1000]
    - [216, 1000]
    - [240, 1000]
    - [256, 1000]